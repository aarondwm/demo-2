<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWM — GCC Audience Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020810;
  --surface:#030c16;
  --surface-2:#040e1a;
  --border:rgba(74,108,247,0.10);
  --border-bright:rgba(74,108,247,0.22);
  --accent:#4a6cf7;
  --accent-dim:rgba(74,108,247,0.06);
  --accent-mid:rgba(74,108,247,0.2);
  --accent-2:#93b4ff;
  --accent-3:#ff3b3b;
  --white:#c8ccd0;
  --white-90:rgba(200,210,220,0.9);
  --white-70:rgba(200,210,220,0.65);
  --white-50:rgba(200,210,220,0.45);
  --white-30:rgba(200,210,220,0.25);
  --white-15:rgba(200,210,220,0.12);
  --white-08:rgba(200,210,220,0.06);
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
html{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--mono)}
body{height:100%;display:flex;flex-direction:column;overflow:hidden}

/* ===== MATRIX RAIN ===== */
.matrix-rain{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:0.05;
}
.matrix-col{
  position:absolute;top:-100%;
  font-family:var(--mono);font-size:12px;line-height:1.4;
  color:var(--accent);
  writing-mode:vertical-rl;
  animation:matrixFall linear infinite;
  opacity:0.6;
}
@keyframes matrixFall{
  0%{transform:translateY(-100%)}
  100%{transform:translateY(calc(100vh + 100%))}
}

/* ===== HEADER ===== */
.header{
  padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(5,5,8,0.92);
  backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;
}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{
  width:36px;height:28px;
  border:1px solid var(--accent);
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--sans);font-weight:800;font-size:10px;color:var(--accent);
  position:relative;
  box-shadow:0 0 8px rgba(74,108,247,0.15);
  letter-spacing:0.08em;
}
.header-logo::after{
  content:'';position:absolute;inset:-3px;
  border:1px solid rgba(74,108,247,0.1);border-radius:4px;
  animation:logoPulse 3s ease infinite;
}
@keyframes logoPulse{0%,100%{opacity:0.3}50%{opacity:0.8}}
.header-title{font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:24px}
.header-time{font-size:11px;color:var(--accent);letter-spacing:0.08em;font-variant-numeric:tabular-nums;opacity:0.7;text-shadow:0 0 12px rgba(74,108,247,0.3)}
.header-status{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--accent);letter-spacing:0.12em;font-weight:600}
.header-status .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent),0 0 4px var(--accent);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

/* ===== MAIN ===== */
.main{flex:1;display:flex;justify-content:center;position:relative;z-index:1}

/* ===== MAP AREA ===== */
.map-area{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:48px 32px;overflow:hidden;
}

/* Grid */
.map-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(74,108,247,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,108,247,0.02) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
  animation:gridShift 20s linear infinite;
}
@keyframes gridShift{0%{background-position:0 0}100%{background-position:60px 60px}}

/* Scanlines */
.scanline{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px);
  pointer-events:none;z-index:5;
}

/* Anchored hover card */
.hover-card{
  position:absolute;
  z-index:50;
  width:230px;
  background:rgba(5,5,8,0.95);
  border:1px solid rgba(74,108,247,0.25);
  font-family:var(--mono);
  opacity:0;
  transform:scale(0.92) translateY(6px);
  transition:opacity 0.25s ease,transform 0.25s cubic-bezier(0.16,1,0.3,1);
  backdrop-filter:blur(14px);
  pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.6),0 0 20px rgba(74,108,247,0.08);
}
.hover-card.show{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}
.hover-card-corner{
  position:absolute;width:8px;height:8px;
  border-color:var(--accent);border-style:solid;
}
.hover-card-corner.tl{top:-1px;left:-1px;border-width:1px 0 0 1px}
.hover-card-corner.tr{top:-1px;right:-1px;border-width:1px 1px 0 0}
.hover-card-corner.bl{bottom:-1px;left:-1px;border-width:0 0 1px 1px}
.hover-card-corner.br{bottom:-1px;right:-1px;border-width:0 1px 1px 0}
.hover-card-arrow{
  position:absolute;bottom:-6px;left:24px;
  width:10px;height:10px;
  background:rgba(5,5,8,0.95);
  border-right:1px solid rgba(74,108,247,0.25);
  border-bottom:1px solid rgba(74,108,247,0.25);
  transform:rotate(45deg);
}
.hover-card.flip-left .hover-card-arrow{left:auto;right:24px}
.hover-card-scan{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;z-index:10;
}
.hover-card-scan.active{opacity:0.6;animation:cardScan 1s ease-out}
@keyframes cardScan{0%{top:0;opacity:0.8}100%{top:100%;opacity:0}}
.hc-header{
  padding:8px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.hc-country{font-family:var(--sans);font-size:12px;font-weight:700;color:var(--accent);letter-spacing:0.02em}
.hc-tag{
  font-size:8px;letter-spacing:0.08em;text-transform:uppercase;
  padding:2px 5px;border:1px solid rgba(74,108,247,0.2);
  color:var(--accent);background:rgba(74,108,247,0.04);
}
.hc-stats{
  padding:8px 12px;border-bottom:1px solid var(--border);
  display:flex;gap:12px;
}
.hc-stat-block{}
.hc-stat-label{font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--white-50);margin-bottom:2px}
.hc-stat-value{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:0.02em;text-shadow:0 0 16px rgba(74,108,247,0.3);line-height:1}
.hc-stat-sub{font-size:8px;color:var(--white-30);margin-top:2px}
.hc-section{padding:6px 12px;border-bottom:1px solid var(--border)}
.hc-section:last-child{border-bottom:none}
.hc-section-title{
  font-size:8px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--accent-2);margin-bottom:4px;
  display:flex;align-items:center;gap:4px;
}
.hc-section-title::before{content:'▸';font-size:7px}
.hc-gender-bar{display:flex;height:5px;border-radius:1px;overflow:hidden;background:rgba(255,255,255,0.03)}
.hc-gender-bar .m{background:#4a6cf7;transition:width 0.6s ease}
.hc-gender-bar .f{background:#7a9cff;transition:width 0.6s ease}
.hc-gender-labels{display:flex;justify-content:space-between;margin-top:4px}
.hc-gender-label{font-size:8px;color:var(--white-50);display:flex;align-items:center;gap:3px}
.hc-gender-dot{width:5px;height:5px;border-radius:50%}
.hc-gender-dot.m{background:#4a6cf7}
.hc-gender-dot.f{background:#7a9cff}
.hc-ind-row{display:flex;align-items:center;gap:4px;padding:1px 0}
.hc-ind-name{font-size:7px;color:var(--white-70);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hc-ind-bar-bg{width:30px;height:2px;background:rgba(74,108,247,0.06);border-radius:1px;overflow:hidden;flex-shrink:0}
.hc-ind-bar{height:100%;background:var(--accent);border-radius:1px;width:0;transition:width 0.6s cubic-bezier(0.16,1,0.3,1)}
.hc-ind-count{font-size:7px;color:var(--accent);font-weight:600;min-width:32px;text-align:right;font-variant-numeric:tabular-nums}
.hc-companies{display:flex;flex-wrap:wrap;gap:3px}
.hc-company{
  font-size:7px;letter-spacing:0.04em;
  padding:1px 4px;border:1px solid var(--border-bright);
  color:var(--white-70);background:rgba(74,108,247,0.03);
}

/* Typing cursor */
.type-cursor{
  display:inline-block;width:2px;height:1em;
  background:var(--accent);margin-left:2px;
  animation:cursorBlink 0.6s step-end infinite;
  vertical-align:text-bottom;
}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}

/* SVG Map */
.map-svg{width:115%;max-width:1050px;height:auto;position:relative;z-index:2;margin:0 auto}

.country-path{
  fill:rgba(74,108,247,0.02);
  stroke:rgba(74,108,247,0.18);
  stroke-width:0.4;
  filter:drop-shadow(0 0 2px rgba(74,108,247,0.12));
  transition:all 0.4s ease;cursor:default;
}
.country-path.gcc{
  fill:rgba(74,108,247,0.04);
  stroke:var(--accent);stroke-width:0.7;stroke-opacity:0.45;
  filter:drop-shadow(0 0 3px rgba(74,108,247,0.20));
  cursor:pointer;transition:all 0.3s ease;
  paint-order:stroke fill;
}
.country-path.gcc:hover{
  fill:rgba(74,108,247,0.22);
  stroke-opacity:0.9;stroke-width:1.1;
  filter:drop-shadow(0 0 14px rgba(74,108,247,0.45));
}
.country-path.gcc.active{
  fill:rgba(74,108,247,0.18);
  stroke-opacity:0.75;stroke-width:1;
  filter:drop-shadow(0 0 12px rgba(74,108,247,0.35));
  animation:countryGlow 2s ease infinite;
}
@keyframes countryGlow{0%,100%{filter:drop-shadow(0 0 12px rgba(74,108,247,0.25))}50%{filter:drop-shadow(0 0 20px rgba(74,108,247,0.4))}}

/* Bahrain marker (too small to see as path) */
.bahrain-ring{animation:bahrainPulse 3s ease infinite}
@keyframes bahrainPulse{0%,100%{stroke-opacity:0.3;r:6}50%{stroke-opacity:0.6;r:8}}
.bahrain-hit:hover ~ .bahrain-ring{stroke-opacity:0.8;stroke-width:1}
.bahrain-hit:hover ~ .bahrain-dot{opacity:1;r:3}
/* City dots */
.city-dot{fill:var(--accent);opacity:0.9;filter:drop-shadow(0 0 4px var(--accent)) drop-shadow(0 0 1px var(--accent))}
.city-dot-ring{fill:none;stroke:var(--accent);stroke-width:0.5;opacity:0;animation:cityRing 4s ease-out infinite}
@keyframes cityRing{0%{r:4;opacity:0.5}100%{r:22;opacity:0}}
.city-label{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;fill:var(--white-70);filter:drop-shadow(0 0 4px rgba(0,0,0,0.8))}
.city-label-sm{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;fill:var(--white-70);filter:drop-shadow(0 0 4px rgba(0,0,0,0.8))}
.city-dot-sm{fill:var(--accent);opacity:0.8;filter:drop-shadow(0 0 3px var(--accent))}

/* Connection lines between cities */
.city-connection{
  stroke:rgba(74,108,247,0.1);stroke-width:0.5;
  stroke-dasharray:4 8;fill:none;
  animation:dashFlow 3s linear infinite;
}
@keyframes dashFlow{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-12}}

/* (bottom panel removed — using hover card instead) */

/* (old panel styles removed) */

/* ===== BOTTOM BAR ===== */
.bottom-bar{
  padding:10px 32px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;color:var(--white-50);letter-spacing:0.1em;text-transform:uppercase;
  background:var(--surface);z-index:2;
}
.bottom-stats{display:flex;gap:28px}
.bottom-stat{display:flex;align-items:center;gap:5px}
.bottom-stat .val{color:var(--accent);font-weight:600;text-shadow:0 0 10px rgba(74,108,247,0.3)}

/* ===== CORNER HUD ===== */
.corner-hud{
  position:absolute;font-size:9px;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--white-50);z-index:3;
  text-shadow:0 0 8px rgba(0,0,0,0.9);
}
.corner-hud.tl{top:14px;left:14px}
.corner-hud.tr{top:14px;right:14px}
.corner-hud.bl{bottom:14px;left:14px}
.corner-hud.br{bottom:14px;right:14px;color:var(--accent);opacity:0.7}
.corner-hud .hl{color:var(--accent);opacity:0.8}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  .hover-card{width:200px}
  .matrix-rain{display:none}
  .header{padding:10px 12px}
  .header-title{font-size:9px}
  .map-area{padding:16px 8px}
  .map-svg{width:100%!important;max-width:none!important}
  .bottom-bar{padding:6px 12px;font-size:7px}
  .corner-hud{font-size:6px}
  .corner-hud.tr{display:none}
  .corner-hud.bl{display:none}
  .hc-country{font-size:10px}
  .hc-stat-value{font-size:13px}
  .hc-stat-label,.hc-stat-sub,.hc-section-title,.hc-gender-label{font-size:6px}
}
</style>
</head>

// ===== LIVE CLOCK =====
function updateClock(){
  const now = new Date();
  document.getElementById('headerTime').textContent =
    now.toTimeString().split(' ')[0] + '.' + String(now.getMilliseconds()).padStart(3,'0').slice(0,2) + ' UTC+3';
}
setInterval(updateClock, 80);
updateClock();

// ===== ANIMATED COUNTERS =====
function animateCounter(el, target, duration){
  const start = 0;
  const startTime = performance.now();
  const numTarget = parseInt(target.replace(/,/g,''));
  function tick(now){
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.floor(numTarget * eased);
    el.textContent = current.toLocaleString();
    if(progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

    total: '3,310,000', totalNum: 3310000, popPct: 72,
    gender: [66, 34],
    nationality: [56, 44],
    age: [['18–24', 17],['25–34', 30],['35–44', 26],['45–54', 17],['55+', 10]],
    education: [['Graduate+', 30],['Undergraduate', 35],['Secondary', 28]],
    companies: ['OQ','Bank Muscat','Omantel','Sohar Port','Bank Dhofar','Oman LNG','OAB','Alizz Islamic','BEL','Oman Shipping'],
    departments: [
      ['Finance', 25, 'fn'],['Operations', 26, 'op'],['Strategy', 15, 'st'],
      ['IT', 14, 'it'],['Marketing', 12, 'mk'],['HR', 8, 'hr']
    ],
    roles: [
      ['CEO / Managing Director', '14,200', 100],
      ['CFO / Finance Director', '6,800', 69],
      ['VP / General Manager', '15,400', 82],
      ['Director Level', '21,600', 91],
      ['Head of Department', '32,200', 95],
      ['Senior Manager', '46,400', 99],
      ['Manager', '42,600', 98],
    ],
    industries: [
      ['Oil & Gas', '124,000', 100],
      ['Financial Services', '134,000', 66],
      ['Tourism', '68,200', 55],
      ['Logistics & Ports', '98,000', 45],
      ['Mining & Minerals', '42,400', 34],
    ],
    center: [720, 300]
  }
};

const card = document.getElementById('hoverCard');
const hoverContent = document.getElementById('hoverContent');
const hoverScan = document.getElementById('hoverScan');
const hoverArrow = document.getElementById('hoverArrow');
const coordDisplay = document.getElementById('coordDisplay');
const gccPaths = document.querySelectorAll('.country-path.gcc');
let activeCountry = null;
let closeTimer = null;

function scheduleClose() {
  closeTimer = setTimeout(hideCard, 200);
}
function cancelClose() {
  if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
}
function hideCard() {
  gccPaths.forEach(p => p.classList.remove('active'));
  card.classList.remove('show');
  activeCountry = null;
  coordDisplay.textContent = 'HOVER FOR INTEL \u25b8';
}

// Per-country card anchor points in SVG viewBox coords
// Each has [anchorX, anchorY] where the card top-left will be placed
const cardPositions = {
  'Kuwait':        { svgX: 550, svgY: -15 },      // further right, clear of Kuwait City text
  'Bahrain':       { svgX: 620, svgY: -15 },      // same area as UAE card
  'Qatar':         { svgX: 620, svgY: -15 },      // same area as UAE card
  'UAE':           { svgX: 620, svgY: -15 },      // high above Ras Al Khaimah
  'Saudi Arabia':  { svgX: 100, svgY: 70 },       // up-left, clear of Riyadh text
  'Oman':          { svgX: 720, svgY: -15 },      // high up, clear of Ras Al Khaimah
};

function positionCard(country) {
  const pos = cardPositions[country];
  if (!pos) return;
  const svg = document.querySelector('.map-svg');
  const svgRect = svg.getBoundingClientRect();
  const mapArea = document.querySelector('.map-area');
  const mapRect = mapArea.getBoundingClientRect();
  const vbX = -28, vbY = -20, vbW = 856, vbH = 667;
  let left = svgRect.left - mapRect.left + ((pos.svgX - vbX) / vbW) * svgRect.width;
  let top = svgRect.top - mapRect.top + ((pos.svgY - vbY) / vbH) * svgRect.height;

  const cardW = 230;
  // Clamp so card doesn't overflow right edge
  if (left + cardW > mapRect.width) {
    left = mapRect.width - cardW - 8;
  }
  // Clamp so card doesn't overflow left edge
  if (left < 8) left = 8;

  card.classList.remove('flip-left');
  hoverArrow.style.display = 'none';
  card.style.left = left + 'px';
  card.style.top = top + 'px';
}

function renderCard(country) {
  const d = audienceData[country];
  if (!d) return;

  const indHTML = d.industries.slice(0, 3).map(([name, count, pct]) =>
    `<div class="hc-ind-row">
      <span class="hc-ind-name">${name}</span>
      <div class="hc-ind-bar-bg"><div class="hc-ind-bar" data-width="${pct}"></div></div>
      <span class="hc-ind-count">${count}</span>
    </div>`
  ).join('');

  const compHTML = d.companies.slice(0, 3).map(c =>
    `<span class="hc-company">${c}</span>`
  ).join('');

  hoverContent.innerHTML = `
    <div class="hc-header">
      <span class="hc-country">${country.toUpperCase()}</span>
      <span class="hc-tag">\u25c9 REACHABLE</span>
    </div>
    <div class="hc-stats">
      <div class="hc-stat-block">
        <div class="hc-stat-label">Total Audience</div>
        <div class="hc-stat-value" id="hcCounter">0</div>
        <div class="hc-stat-sub">${d.popPct}% of population</div>
      </div>
    </div>
    <div class="hc-section">
      <div class="hc-section-title">Top Industries</div>
      ${indHTML}
    </div>
    <div class="hc-section">
      <div class="hc-section-title">Key Companies</div>
      <div class="hc-companies">${compHTML}</div>
    </div>
  `;

  // Scan line
  hoverScan.classList.remove('active');
  void hoverScan.offsetWidth;
  hoverScan.classList.add('active');

  // Animate counter
  setTimeout(() => {
    const el = document.getElementById('hcCounter');
    if (el) animateCounter(el, d.total, 800);
  }, 80);

  // Animate bars
  requestAnimationFrame(() => {
    setTimeout(() => {
      hoverContent.querySelectorAll('.hc-ind-bar,.hc-gender-bar .m,.hc-gender-bar .f').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    }, 120);
  });
}

// Hover events on country paths
gccPaths.forEach(path => {
  path.addEventListener('mouseenter', () => {
    cancelClose();
    const country = path.dataset.country;
    if (!audienceData[country]) return;

    gccPaths.forEach(p => p.classList.remove('active'));
    path.classList.add('active');
    activeCountry = country;

    renderCard(country);
    card.classList.add('show');
    // Position after content is rendered
    requestAnimationFrame(() => positionCard(country));
    coordDisplay.textContent = country.toUpperCase() + ' \u00b7 LOCKED \u25b8';
  });

  path.addEventListener('mouseleave', scheduleClose);
});

// Keep card open when hovering over it
card.addEventListener('mouseenter', cancelClose);
card.addEventListener('mouseleave', scheduleClose);

// Close when leaving map area entirely
document.querySelector('.main').addEventListener('mouseleave', () => {
  cancelClose();
  hideCard();
});

// Mouse tracking for coord display
document.querySelector('.map-svg').addEventListener('mousemove', (e) => {
  if (activeCountry) return;
  const svg = e.currentTarget;
  const rect = svg.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width * 25 + 35).toFixed(1);
  const y = (32 - (e.clientY - rect.top) / rect.height * 19.5).toFixed(1);
  coordDisplay.textContent = y + '\u00b0N ' + x + '\u00b0E';
});

// Reposition on resize
window.addEventListener('resize', () => {
  if (activeCountry) positionCard(activeCountry);
});

</script>
</body>
</html>
